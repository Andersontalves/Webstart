<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - WebStart</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .offline-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            background: var(--bg-body);
        }
        .offline-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 24px;
            color: var(--text-muted);
        }
        .offline-title {
            font-size: 1.5rem;
            margin-bottom: 12px;
        }
        .offline-text {
            color: var(--text-muted);
            max-width: 400px;
            margin-bottom: 24px;
        }
        .btn-retry {
            background: var(--primary);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <main class="offline-page">
        <svg class="offline-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414" />
        </svg>
        <h1 class="offline-title">Você está offline</h1>
        <p class="offline-text">Parece que você perdeu a conexão com a internet. Não se preocupe, você pode tentar novamente ou retornar mais tarde.</p>
        <a href="/" class="btn-retry">Tentar novamente</a>
    </main>
</body>
</html>
