<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WebStart Área do Cliente</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background: linear-gradient(135deg, var(--bg-body) 0%, rgba(37,99,235,0.1) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="glass-card" style="width: 100%; max-width: 450px; padding: 40px;">
        <div style="text-align: center; margin-bottom: 30px;">
            <a href="index.html" class="nav-brand" style="justify-content: center; font-size: 2rem;">
                <i data-lucide="rocket" style="color: var(--primary); width: 32px; height: 32px;"></i> WebStart
            </a>
            <p class="text-muted" style="margin-top: 10px;">Área exclusiva do cliente</p>
        </div>

        <form action="dashboard-cliente.html" style="display: flex; flex-direction: column; gap: 20px;">
            <div>
                <label style="display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 6px; color: var(--text-muted);">E-mail</label>
                <div style="position: relative;">
                    <i data-lucide="mail" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted);" width="18"></i>
                    <input type="email" placeholder="seu@email.com" required style="width: 100%; padding: 14px 16px 14px 45px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: #fff; font-family: 'Inter'; font-size: 1rem; outline: none;">
                </div>
            </div>

            <div>
                <label style="display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: 500; margin-bottom: 6px; color: var(--text-muted);">
                    Senha
                    <a href="#" style="color: var(--primary); text-decoration: none;">Esqueceu?</a>
                </label>
                <div style="position: relative;">
                    <i data-lucide="lock" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted);" width="18"></i>
                    <input type="password" placeholder="••••••••" required style="width: 100%; padding: 14px 16px 14px 45px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: #fff; font-family: 'Inter'; font-size: 1rem; outline: none;">
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 16px; margin-top: 10px; background: var(--gradient-primary);">
                Acessar Painel <i data-lucide="arrow-right" width="18"></i>
            </button>
        </form>

        <div style="text-align: center; margin-top: 30px; font-size: 0.95rem; color: var(--text-muted);">
            Não tem uma conta? <a href="#" style="color: #fff; font-weight: 600;">Faça um orçamento</a>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
