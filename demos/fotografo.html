<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniel Lens - Fotógrafo Artístico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Work+Sans:wght@300;400;600&display=swap');
        body { font-family: 'Work Sans', sans-serif; background-color: #fafafa; color: #1a1a1a; }
        h1, h2, .serif { font-family: 'Cormorant Garamond', serif; }
        .masonry { column-count: 3; column-gap: 1em; }
        @media (max-width: 768px) { .masonry { column-count: 2; } }
        @media (max-width: 480px) { .masonry { column-count: 1; } }
        .masonry-item { break-inside: avoid; margin-bottom: 1em; overflow: hidden; }
        .masonry-item img { width: 100%; display: block; filter: grayscale(100%); transition: 0.5s; cursor: crosshair; }
        .masonry-item img:hover { filter: grayscale(0%); transform: scale(1.03); }
    </style>
</head>
<body class="p-8 md:p-6 md:p-16">
    <a href="../portfolio.html" class="fixed bottom-6 right-6 z-50 bg-white/80 backdrop-blur-md border border-gray-200 text-gray-800 px-4 py-3 text-xs font-semibold uppercase tracking-widest hover:bg-black hover:text-white transition mix-blend-difference shadow-2xl">
        Voltar à WebStart
    </a>

    <header class="text-center mb-24 mt-10">
        <h1 class="text-4xl md:text-6xl md:text-8xl font-light tracking-tight mb-4 lowercase">daniel lens.</h1>
        <p class="uppercase tracking-[0.4em] text-xs font-semibold text-gray-500 mt-6">Fotografia Analógica & Arte Contemporânea</p>
    </header>

    <main class="max-w-7xl mx-auto">
        <div class="masonry">
            <div class="masonry-item"><img src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?w=500" alt="Galeria"></div>
            <div class="masonry-item"><img src="https://images.unsplash.com/photo-1542038784456-1ea8e935640e?w=500" alt="Galeria"></div>
            <div class="masonry-item"><img src="https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=500" alt="Galeria"></div>
            <div class="masonry-item"><img src="https://images.unsplash.com/photo-1554080353-a576cf803bda?w=500" alt="Galeria"></div>
            <div class="masonry-item"><img src="https://images.unsplash.com/photo-1517457373958-b7bdd4587205?w=500" alt="Galeria"></div>
            <div class="masonry-item"><img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=500" alt="Galeria"></div>
        </div>
    </main>

    <footer class="mt-32 text-center text-xs tracking-[0.2em] uppercase border-t border-gray-200 pt-12 pb-8">
        Daniel Lens © 2026. Design por WebStart Agency.
    </footer>
</body>
</html>
