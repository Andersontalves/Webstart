<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - WebStart</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background: linear-gradient(135deg, var(--bg-body) 0%, rgba(37,99,235,0.1) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="glass-card" style="width: 100%; max-width: 450px; padding: 40px;">
        <div style="text-align: center; margin-bottom: 30px;">
            <a href="index.html" class="nav-brand" style="justify-content: center; font-size: 2rem;">
                <i data-lucide="rocket" style="color: var(--primary); width: 32px; height: 32px;"></i> WebStart
            </a>
            <p class="text-muted" style="margin-top: 10px;">Crie sua conta para acessar o painel</p>
        </div>

        <form id="registerForm" style="display: flex; flex-direction: column; gap: 20px;">
            <div id="errorBox" style="display: none; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #ef4444; padding: 12px; border-radius: 8px; font-size: 0.85rem; text-align: center;"></div>
            <div id="successBox" style="display: none; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); color: var(--success); padding: 12px; border-radius: 8px; font-size: 0.85rem; text-align: center;">Conta criada com sucesso! Redirecionando...</div>

            <div>
                <label style="display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 6px; color: var(--text-muted);">Nome da Empresa ou Usuário</label>
                <div style="position: relative;">
                    <i data-lucide="user" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted);" width="18"></i>
                    <input type="text" id="name" placeholder="Sua Empresa" required style="width: 100%; padding: 14px 16px 14px 45px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: #fff; font-family: 'Inter'; font-size: 1rem; outline: none;">
                </div>
            </div>

            <div>
                <label style="display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 6px; color: var(--text-muted);">E-mail</label>
                <div style="position: relative;">
                    <i data-lucide="mail" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted);" width="18"></i>
                    <input type="email" id="email" placeholder="seu@email.com" required style="width: 100%; padding: 14px 16px 14px 45px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: #fff; font-family: 'Inter'; font-size: 1rem; outline: none;">
                </div>
            </div>

            <div>
                <label style="display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 6px; color: var(--text-muted);">Senha</label>
                <div style="position: relative;">
                    <i data-lucide="lock" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted);" width="18"></i>
                    <input type="password" id="password" placeholder="••••••••" required minlength="6" style="width: 100%; padding: 14px 45px 14px 45px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: #fff; font-family: 'Inter'; font-size: 1rem; outline: none;">
                    <i data-lucide="eye" id="togglePassword" style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); cursor: pointer;" width="18"></i>
                </div>
            </div>

            <div>
                <label style="display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 6px; color: var(--text-muted);">Confirmar Senha</label>
                <div style="position: relative;">
                    <i data-lucide="lock" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted);" width="18"></i>
                    <input type="password" id="confirmPassword" placeholder="••••••••" required minlength="6" style="width: 100%; padding: 14px 45px 14px 45px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: #fff; font-family: 'Inter'; font-size: 1rem; outline: none;">
                    <i data-lucide="eye" id="toggleConfirmPassword" style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); cursor: pointer;" width="18"></i>
                </div>
            </div>

            <button type="submit" id="btnSubmit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 16px; margin-top: 10px; background: var(--gradient-primary);">
                Criar Conta Agora <i data-lucide="arrow-right" width="18"></i>
            </button>
        </form>

        <div style="text-align: center; margin-top: 30px; font-size: 0.95rem; color: var(--text-muted);">
            Já possui uma conta? <a href="login.html" style="color: #fff; font-weight: 600;">Faça o login</a>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
    <script type="module">
        import { auth } from './js/firebase-config.js';
        import { createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

        const registerForm = document.getElementById('registerForm');
        const btnSubmit = document.getElementById('btnSubmit');
        const errorBox = document.getElementById('errorBox');
        const successBox = document.getElementById('successBox');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorBox.style.display = 'none';
            successBox.style.display = 'none';
            btnSubmit.innerHTML = 'Criando... <i data-lucide="loader" class="spin" style="animation: spin 1s linear infinite;"></i>';
            lucide.createIcons();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                errorBox.innerText = 'As senhas digitadas não coincidem!';
                errorBox.style.display = 'block';
                btnSubmit.innerHTML = 'Criar Conta Agora <i data-lucide="arrow-right"></i>';
                lucide.createIcons();
                return;
            }

            try {
                // Cria a conta no Firebase Authentication
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // Grava o Nome Fantasia no Perfil do Auth
                await updateProfile(user, { displayName: name });
                
                successBox.style.display = 'block';
                
                // Redireciona pro Dashboard em 1 segundo
                setTimeout(() => {
                    window.location.href = 'dashboard-cliente.html';
                }, 1500);

            } catch (error) {
                console.error("Erro no cadastro:", error);
                errorBox.style.display = 'block';
                
                if(error.code === 'auth/email-already-in-use') {
                    errorBox.innerText = 'Esse e-mail já está em uso.';
                } else if(error.code === 'auth/weak-password') {
                    errorBox.innerText = 'A senha precisa ter pelo menos 6 caracteres.';
                } else if(error.code === 'auth/operation-not-allowed') {
                    errorBox.innerText = 'O método E-mail/Senha não está ativado no Firebase Console!';
                } else {
                    errorBox.innerText = `Erro: ${error.code || error.message}`;
                }
                
                btnSubmit.innerHTML = 'Criar Conta Agora <i data-lucide="arrow-right"></i>';
                lucide.createIcons();
            }
        });

        // Lógica de Olho Mágico (Revelar Senha)
        const togglePassword = document.getElementById('togglePassword');
        const passwordField = document.getElementById('password');
        togglePassword.addEventListener('click', () => {
            const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordField.setAttribute('type', type);
            togglePassword.setAttribute('data-lucide', type === 'password' ? 'eye' : 'eye-off');
            lucide.createIcons();
        });

        const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
        const confirmPasswordField = document.getElementById('confirmPassword');
        toggleConfirmPassword.addEventListener('click', () => {
            const type = confirmPasswordField.getAttribute('type') === 'password' ? 'text' : 'password';
            confirmPasswordField.setAttribute('type', type);
            toggleConfirmPassword.setAttribute('data-lucide', type === 'password' ? 'eye' : 'eye-off');
            lucide.createIcons();
        });
    </script>
    <style>
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</body>
</html>
